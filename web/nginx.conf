# nginx config for the web container: serves the React SPA and reverse-proxies
# the API to the backend container over the Docker network.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable upload ceiling (matches the backend default of 10 MB + slack).
    client_max_body_size 12m;

    # Proxy API, docs and the OpenAPI spec to the backend service.
    location /api/ {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # DNS checks can take a while for large batches.
        proxy_read_timeout 300s;
    }

    # SPA fallback: serve index.html for client-side routes (e.g. /batches/:id).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (hashed filenames from Vite).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
