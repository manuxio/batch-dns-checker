# nginx config for the web container: serves the React SPA and reverse-proxies
# the API to the backend container over the Docker network.
#
# Security headers are repeated per location because nginx's add_header does NOT
# inherit into a location that declares its own add_header. The SPA gets a strict
# Content-Security-Policy; /api keeps a relaxed CSP because Swagger UI (/api/docs)
# uses inline scripts/styles.
server {
    listen 80;
    server_name _;
    server_tokens off; # don't leak the nginx version

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable upload ceiling (matches the backend default of 10 MB + slack).
    client_max_body_size 12m;

    # Proxy API, docs and the OpenAPI spec to the backend service.
    location /api/ {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'" always;

        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # DNS checks can take a while for large batches.
        proxy_read_timeout 300s;
    }

    # Cache static assets aggressively (hashed filenames from Vite).
    location /assets/ {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; form-action 'self'" always;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # SPA fallback: serve index.html for client-side routes (e.g. /batches/:id).
    location / {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; form-action 'self'" always;

        try_files $uri $uri/ /index.html;
    }
}
