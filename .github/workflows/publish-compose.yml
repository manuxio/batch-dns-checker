name: Publish Compose (OCI)

# Publishes docker-compose.ghcr.yml as an OCI artifact to GHCR so the whole
# project can be started with:
#   docker compose -f oci://ghcr.io/manuxio/batch-dns-checker:compose up -d
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish compose OCI artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose version
        run: docker compose version

      - name: Publish compose as OCI artifact
        run: |
          docker compose -f docker-compose.ghcr.yml publish \
            "ghcr.io/${{ github.repository }}:compose" --yes
