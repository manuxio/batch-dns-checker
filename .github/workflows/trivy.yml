name: Trivy security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: Filesystem scan (vuln, secrets, misconfig)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
        env:
          # Avoid rate-limited DB pulls from ghcr during scheduled runs.
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy fail-gate (HIGH/CRITICAL vulns only)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0' # report only; set to '1' to block the pipeline
